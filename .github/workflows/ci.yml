# Credential-free gates on every push/PR: the fake-client test suite, ruff,
# black, and mypy --strict, across the supported Python versions. The tests
# additionally run on macOS and Windows — path handling and the scheduler
# layer (schtasks / systemd user / launchd) are platform-dispatched and their
# shared code must stay green everywhere.
#
# The Linux leg installs the optional `tray` extra so the PySide6 UI code is
# exercised (headless, QT_QPA_PLATFORM=offscreen) and mypy can read PySide6's
# stubs; the macOS/Windows legs stay core-only, which also proves the package
# still builds and tests without the extra (the tray tests skip via importorskip).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Nothing here writes back to the repo — checkout is the only token consumer.
permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      # PySide6's offscreen platform plugin needs these shared libraries.
      - name: Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3
      - name: Sync dependencies (Linux — with tray extra)
        if: runner.os == 'Linux'
        run: uv sync --extra tray --group qt
      - name: Sync dependencies (macOS/Windows — core only)
        if: runner.os != 'Linux'
        run: uv sync
      - name: Tests
        run: uv run pytest -q --cov --cov-report=xml
      # Every leg uploads; Codecov merges them per commit — the macOS/Windows
      # legs execute scheduler branches the ubuntu leg never does. A Codecov
      # outage must not break the gates, hence fail_ci_if_error stays off.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
      # The static gates are platform-independent; run them once per Python on
      # the Linux leg, which has PySide6 installed (mypy reads its stubs).
      - name: Ruff lint
        if: runner.os == 'Linux'
        run: uv run ruff check src tests
      - name: Black format
        if: runner.os == 'Linux'
        run: uv run black --check src tests
      - name: Mypy (strict)
        if: runner.os == 'Linux'
        run: uv run mypy src
